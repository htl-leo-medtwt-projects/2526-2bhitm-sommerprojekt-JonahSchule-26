<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kart and Key - The Game</title>
    <script src="./scripts/game.js" defer></script>
    <script src="./scripts/other-functions.js" defer></script>
    <link rel="stylesheet" href="./styles/body-head.css">
    <link rel="stylesheet" href="./styles/hub.css">
</head>

<body>
    <section id="hub">
        <img src="./assets/img/the-hub.png" alt="The Hub" id="hub-image">
        <div id="player-box"><img src="" alt="Player"></div>

        <!-- RACES -->
        <button type="button" class="enter-race" id="race-button-1">Enter<br>Race</button>
        <button type="button" class="enter-race" id="race-button-2">Enter<br>Race</button>
        <button type="button" class="enter-race" id="race-button-3">Enter<br>Race</button>
        <button type="button" class="enter-race" id="race-button-4">Enter<br>Race</button>
        <button type="button" class="enter-race" id="race-button-5">Enter<br>Race</button>
        <button type="button" class="enter-race" id="race-button-6">Enter<br>Race</button>
        <button type="button" class="enter-race" id="race-button-7">Enter<br>Race</button>
        <button type="button" class="enter-race" id="race-button-8">Enter<br>Race</button>
        <button type="button" class="enter-race" id="race-button-9">Enter<br>Race</button>
        <button type="button" class="enter-race" id="race-button-10">Enter<br>Race</button>
        <button type="button" class="enter-race" id="race-button-11">Enter<br>Race</button>
        <button type="button" class="enter-race" id="race-button-12">Enter<br>Race</button>
        <button type="button" class="enter-race" id="race-button-13">Enter<br>Race</button>
        <button type="button" class="enter-race" id="race-button-14">Enter<br>Race</button>


        <button onclick="showGarage()" id="goToGarage-button">Garage</button>
        <div id="lives">
            Lives left:
            <img src="./assets/img/Heart.png" alt="Live Full" class="live" id="live1">
            <img src="./assets/img/Heart.png" alt="Live Full" class="live" id="live2">
            <img src="./assets/img/Heart.png" alt="Live Full" class="live" id="live3">
        </div>
        <div id="garage-power">
            <div id="power-text">Power: 0</div>
            <div id="power-bar">
                <div id="power-fill"></div>
            </div>
        </div>
    </section>
    <section id="garage">
        <div id="upgrade-grid">
            <div id="motor" onclick="upgradeMotor()">
                <img src="./assets/img/engine-icon.png" alt="Engine Icon">
                <div id="motor-upgrade-text-box" class="upgrade-text-box">
                    MOTOR
                </div>
            </div>
            <div id="grip" onclick="upgradeGrip()">
                <img src="./assets/img/tyre.png" alt="Grip Icon">
                <div id="grip-upgrade-text-box" class="upgrade-text-box">
                    GRIP
                </div>
            </div>
            <div id="transmisson" onclick="upgradeTransmission()">
                <img src="./assets/img/manual-transmission.png" alt="Transmission Icon">
                <div id="transmission-upgrade-text-box" class="upgrade-text-box">
                    TRANSMISSION
                </div>
            </div>
        </div>
        <div class="back-button">
            <button onclick="showHub()">Back to Hub</button>
        </div>
        <img src="./assets/img/F1-Car-Garage.png" alt="Kart" id="img-of-kart">
    </section>
</body>

</html>
