<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kart and Key - Start</title>
    <link rel="stylesheet" href="./styles/body-head.css">
    <link rel="stylesheet" href="./styles/landing-page.css">
    <script src="./scripts/landing-page-function.js" defer></script>
</head>

<body>
    <main>
        <section id="start-screen" class="general">
            <h1 id="start-screen-headline">Kart and Key</h1>
            <div id="selection-grid">
                <div id="start-game" class="optionForStart"><a href="./game.html">START GAME</a></div>
                <div id="options" class="optionForStart" onclick="showOptionsScreen()">OPTIONS</div>
                <div id="leaderboard" class="optionForStart" onclick="showLeaderboardScreen()">LEADERBOARD</div>
                <div id="tutorial" class="optionForStart" onclick="showTutorialScreen()">TUTORIAL</div>
                <div id="exit-button" class="optionForStart" onclick="showExitScreen()">EXIT</div>
            </div>
        </section>

        <section id="optionsScreen" class="general">
            <div class="options-container">
                <h1 class="options-headline">OPTIONS</h1>

                <div class="options-content">
                    <!-- Music Volume Slider -->
                    <div class="option-item">
                        <label>MUSIC VOLUME:</label>
                        <div class="slider-container">
                            <input type="range" id="music-volume" class="volume-slider" min="0" max="100" value="70">
                            <span id="music-value" class="volume-value">70%</span>
                        </div>
                    </div>

                    <!-- SFX Volume Slider -->
                    <div class="option-item">
                        <label>SFX VOLUME:</label>
                        <div class="slider-container">
                            <input type="range" id="sfx-volume" class="volume-slider" min="0" max="100" value="80" ondrag="">
                            <span id="sfx-value" class="volume-value">80%</span>
                        </div>
                    </div>

                    <!-- Zusätzliche Option 1 -->
                    <div class="option-item">
                        <label>OPTION 1:</label>
                        <select id="option-1" class="option-select">
                            <option value="1">Option 1</option>
                            <option value="2" selected>Option 2</option>
                            <option value="3">Options 3</option>
                        </select>
                    </div>

                    <!-- Zusätzliche Option 2 -->
                    <div class="option-item">
                        <label>OPTION 2:</label>
                        <select id="option-2" class="option-select">
                            <option value="none" selected>- Please choose your language -</option>
                            <option value="en">English</option>
                            <option value="de" selected>German</option>
                        </select>
                    </div>
                </div>

                <div class="options-buttons">
                    <button id="reset-options" class="option-action-btn reset-btn"
                        onclick="showAreYouSureScreen()">Reset</button>
                    <button id="cancel-options" class="option-action-btn cancel-btn"
                        onclick="showStartScreen()">Cancel</button>
                    <button id="apply-options" class="option-action-btn apply-btn"
                        onclick="applyOptions(); showStartScreen()">Apply</button>
                </div>
            </div>
        </section>

        <section id="exitScreen">
            <div>
                <h1 id="exit-headline" class="areYouSure">Are you Sure?</h1>
                <div id="yes-no-grid">
                    <div id="yes" class="optionForExit" onclick="exitGame()">YES</div>
                    <div id="no" class="optionForExit" onclick="showStartScreen()">NO</div>
                </div>
            </div>
        </section>

        <section id="leaderboardScreen" class="general">
        </section>

        <section id="tutorialScreen" class="general">
            <div class="tutorial-overlay">
                <div class="tutorial-dialog">
                    <h2 id="tutorial-title" class="tutorial-title">Welcome to Kart and Key!</h2>
                    <p id="tutorial-text" class="tutorial-text">Click anywhere to start the tutorial...</p>
                    <div class="tutorial-progress">
                        <span id="tutorial-step" class="tutorial-step">Step 0/0</span>
                    </div>
                </div>
            </div>
        </section>

        <section id="are-you-sure" class="general">
            <div>
                <h1 id="are-you-sure-headline" class="areYouSure">Are you Sure?</h1>
                <div id="yes-no-grid-are-you-sure">
                    <div id="yes-button-are-you-sure" class="areYouSureOption"
                        onclick="applyOptions(); showStartScreen()">YES</div>
                    <div id="no-button-are-you-sure" class="areYouSureOption" onclick="showOptionsScreen()">NO</div>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
